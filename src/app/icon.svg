<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Bubble icon">
  <defs>
    <radialGradient id="bubbleFill" cx="30%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#dff3ff"/>
      <stop offset="68%" stop-color="#8fd5ff"/>
      <stop offset="100%" stop-color="#3298d7"/>
    </radialGradient>
    <linearGradient id="ringFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d8efff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#4a91c4" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="64" fill="#eef8ff"/>

  <g filter="url(#softShadow)">
    <circle cx="124" cy="132" r="88" fill="url(#bubbleFill)"/>
    <circle cx="124" cy="132" r="87" fill="none" stroke="url(#ringFill)" stroke-width="2"/>
    <ellipse cx="95" cy="94" rx="34" ry="22" fill="#ffffff" opacity="0.58"/>

    <circle cx="199" cy="73" r="22" fill="#bce7ff"/>
    <circle cx="199" cy="73" r="21" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="2"/>
    <circle cx="59" cy="190" r="15" fill="#cfeeff"/>
    <circle cx="59" cy="190" r="14" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
  </g>

  <text
    x="124"
    y="154"
    text-anchor="middle"
    font-size="104"
    font-family="Georgia, Times New Roman, serif"
    font-weight="700"
    fill="#0f2c49"
  >∫</text>

  <circle cx="177" cy="176" r="8" fill="#0f6ea6" opacity="0.9"/>
</svg>
